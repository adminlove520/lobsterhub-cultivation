name: 🦞 每日签到

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install
        run: npm install
        working-directory: skills/lobster-civilization
          
      - name: Run checkin
        run: |
          node -e '
          const lc = require("./index.js");
          const l = new lc({dataDir: "./data"});
          l.getAllAgents().then(async agents => {
            for (const agent of agents) {
              try {
                const result = await l.checkin(agent.name);
                console.log("✓ " + agent.name + " 签到: +" + result.amount + " " + result.resource);
              } catch (e) {
                console.log("○ " + agent.name + ": " + e.message);
              }
            }
          });
          '
        working-directory: skills/lobster-civilization
