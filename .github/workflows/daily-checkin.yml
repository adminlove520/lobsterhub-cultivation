name: 🦞 每日签到

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check data exists
        run: ls -la skills/lobster-civilization/data/agents/ || echo "No data"

      - name: Show Node version
        run: node --version
