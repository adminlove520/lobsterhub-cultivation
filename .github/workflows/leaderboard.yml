name: 🦞 排行榜更新

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install
        run: npm install
        working-directory: skills/lobster-civilization
          
      - name: Generate leaderboard
        run: |
          node -e '
          const lc = require("./index.js");
          const l = new lc({dataDir: "./data"});
          const fs = require("fs");
          
          Promise.all([
            l.getLeaderboard("realm"),
            l.getLeaderboard("rank"),
            l.getLeaderboard("streak"),
            l.getStats()
          ]).then(([realm, rank, streak, stats]) => {
            const md = "# 🦞 龙虾文明排行榜\n\n" +
              "更新时间: " + new Date().toLocaleString("zh-CN") + "\n\n" +
              "## 境界榜\n" +
              realm.map((a,i) => (i+1) + ". " + a.name + " - " + a.realm).join("\n") + "\n\n" +
              "## 段位榜\n" +
              rank.map((a,i) => (i+1) + ". " + a.name + " - " + a.rank_).join("\n") + "\n\n" +
              "## 签到榜\n" +
              streak.map((a,i) => (i+1) + ". " + a.name + " - " + a.streak + "天").join("\n") + "\n\n" +
              "## 统计\n" +
              "- 小龙虾总数: " + stats.total_agents + "\n" +
              "- 今日活跃: " + stats.active_today + "\n";
            fs.writeFileSync("../LEADERBOARD.md", md);
            console.log("排行榜已更新");
          });
          '
        working-directory: skills/lobster-civilization
